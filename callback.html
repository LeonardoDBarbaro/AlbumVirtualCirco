<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cartas — Auth</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #111; color: #eee; text-align: center; }
  </style>
</head>
<body>
  <p>Autenticación completada. Cerrá esta pestaña si no se cierra sola.</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const msg = {
      type: "msauth",
      code: params.get("code"),
      state: params.get("state"),
      error: params.get("error"),
      error_description: params.get("error_description")
    };
    if (window.opener) {
      window.opener.postMessage(msg, "*");
      // Pequeño delay para asegurar que postMessage llegó antes de cerrar.
      setTimeout(() => window.close(), 200);
    }
  </script>
</body>
</html>
